<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Verification ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="welcomeScreen">

        <div class="card">

            <h1>💖 Relationship Verification Portal 💖</h1>

            <p>Only authorized girlfriends may proceed ❤️</p>

            <input
                type="text"
                id="girlfriendName"
                placeholder="Enter your name">

            <br><br>

            <button id="verifyBtn">
                Verify Identity ❤️
            </button>

            <p id="message"></p>

        </div>

    </div>


   <div id="searchScreen" style="display:none;">

    <div class="card">

        <h2>🔍 Love Scanner</h2>

        <p id="loadingText"></p>

        <button
            id="continueBtn"
            style="display:none;">
            Continue ❤️
        </button>

    </div>

</div>


   <div id="boyfriendScreen" style="display:none;">

    <div class="card">

        <h1>💙 Boyfriend Verification 💙</h1>

        <p>Please verify your boyfriend before continuing ❤️</p>

        <input
            type="text"
            id="boyfriendName"
            placeholder="Enter boyfriend's name">

        <br><br>

        <button id="boyfriendBtn">
            Verify Boyfriend ❤️
        </button>

        <p id="boyfriendMessage"></p>

    </div>

</div>

    <div class="card">

        <h1>💌 A Letter For You 💌</h1>

        <p>
            Apple has written something from the heart...
        </p>

        <div id="envelope">

            <div class="letter"></div>

        </div>

        <p>Click the envelope to open it ❤️</p>

    </div>

</div>


   <div id="letterScreen" style="display:none;">

    <div class="card">

        <h1>💖 Dear Bhoot 💖</h1>

        <p id="letterText"></p>

        <button id="letterNextBtn" style="display:none;">
            Continue ❤️
        </button>

    </div>

</div>

    <div id="photo1Screen" style="display:none;">

    </div>


    <div id="photo2Screen" style="display:none;">

    </div>


    <div id="finalScreen" style="display:none;">

    </div>


    <script src="script.js"></script>

</body>

</html>
