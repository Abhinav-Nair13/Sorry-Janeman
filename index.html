<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relationship Verification ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

            <h1>💖 Relationship Verification Portal 💖</h1>

            <p>Only authorized girlfriends may proceed ❤️</p>

            <input
                type="text"
                id="girlfriendName"
                placeholder="Enter your name">

            <br><br>

            <button id="verifyBtn">
                Verify Identity ❤️
            </button>

            <p id="message"></p>

        </div>

    </div>


    <div id="searchScreen" style="display:none;">

        <div class="card">

            <h2>🔍 Love Scanner</h2>

            <p id="loadingText"></p>

        </div>

    </div>


    <div id="boyfriendScreen" style="display:none;">

    </div>


    <div id="envelopeScreen" style="display:none;">

    </div>


    <div id="letterScreen" style="display:none;">

    </div>


    <div id="photo1Screen" style="display:none;">

    </div>


    <div id="photo2Screen" style="display:none;">

    </div>


    <div id="finalScreen" style="display:none;">

    </div>


    <script src="script.js"></script>

</body>

</html>
